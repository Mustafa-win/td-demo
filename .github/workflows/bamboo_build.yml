name: Manual Deploy to Vercel & Cloudflare R2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Vercel Pull
        run: npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Vercel Build
        env:
          NEXT_PUBLIC_APP_NAME: ${{ secrets.NEXT_PUBLIC_APP_NAME }}
          VERCEL_DEPLOYMENT_ID: ${{ github.sha }}-${{ github.run_number }}
          VERCEL_ENV: production
        run: npx vercel build --prod --token=$VERCEL_TOKEN

      - name: Upload static assets to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          NEXT_PUBLIC_APP_NAME: ${{ secrets.NEXT_PUBLIC_APP_NAME }}
          VERCEL_DEPLOYMENT_ID: ${{ github.sha }}-${{ github.run_number }}
          VERCEL_ENV: production
        run: |
          if [ -z "$R2_BUCKET" ]; then
            echo "R2_BUCKET not set, skipping R2 upload"
            exit 0
          fi

          if [ -d ".vercel/output/static/_next/static" ]; then
            export STATIC_DIR=".vercel/output/static/_next/static"
          elif [ -d ".next/static" ]; then
            export STATIC_DIR=".next/static"
          else
            echo "No static assets directory found, skipping R2 upload"
            exit 0
          fi

          echo "Deployment version: $VERCEL_DEPLOYMENT_ID"
          echo "Static dir: $STATIC_DIR"

          npx wrangler --version
          bash ./scripts/upload-static-to-r2.sh

      - name: Vercel Deploy
        run: npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --yes
